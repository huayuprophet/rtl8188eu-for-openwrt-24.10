name: Build rtl8188eu for ImmortalWrt 24.10.5

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Platform (e.g., x86/64, arm/virt)'
        required: true
        default: 'x86/64'
      subtarget:
        description: 'Subtarget (Optional, leave empty if unsure)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libc6-dev libssl-dev libstdc++-14-dev \
          libxml-parser-perl make unzip wget xsltproc zlib1g-dev zstd

      - name: Clone ImmortalWrt Source 24.10.5
        run: |
          # 1. 克隆完整源码 (为了获取固件依赖)
          git clone --depth 1 -b v24.10.5 https://github.com/immortalwrt/immortalwrt.git source
          
          # 2. 进入目录并更新 feeds
          cd source
          ./scripts/feeds update -a

      - name: Prepare Package
        run: |
          # 1. 将你的驱动源码复制到 package 目录
          # 重命名为 rtl8188eu-custom 以避免与官方源码中的同名包冲突
          cp -r ./* source/package/rtl8188eu-custom/
          
          # 2. 安装 feeds (这一步会注册 rtl8188eu-firmware 依赖)
          cd source
          ./scripts/feeds install -a

      - name: Configure Build
        run: |
          cd source
          # 使用 echo -e 替代 cat <<EOF 以避免 YAML 缩进错误
          echo -e "CONFIG_TARGET_BOARD=\"${{ github.event.inputs.target }}\"\nCONFIG_TARGET_SUBTARGET=\"${{ github.event.inputs.subtarget }}\"\nCONFIG_TARGET_PROFILE=\"Default\"\nCONFIG_PACKAGE_rtl8188eu-custom=m" > .config
          make defconfig

      - name: Build Package
        run: |
          cd source
          # 编译你的驱动包
          make package/rtl8188eu-custom/compile -j$(nproc) V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtl8188eu-ipk
          path: source/bin/packages/**/*.ipk
