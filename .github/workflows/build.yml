name: Build rtl8188eu for ImmortalWrt 24.10.5

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Platform (e.g., x86/64, arm/virt)'
        required: true
        default: 'x86/64'
      subtarget:
        description: 'Subtarget (Optional, leave empty if unsure)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libc6-dev libssl-dev libstdc++-14-dev \
          libxml-parser-perl make unzip wget xsltproc zlib1g-dev zstd

      - name: Clone ImmortalWrt Source 24.10.5
        run: |
          # 定义版本
          VERSION="24.10.5"
          # 克隆源码
          git clone --depth 1 -b releases/${VERSION} https://github.com/immortalwrt/immortalwrt.git source
          cd source
          
          # 初始化 feeds
          ./scripts/feeds update -a

      - name: Prepare Package
        run: |
          # 1. 复制你的驱动代码到源码树的 package 目录
          # 注意：这里假设你的仓库根目录下的文件（Makefile, core, hal 等）是驱动源码
          cp -r ./* source/package/rtl8188eu-custom/
          
          # 2. 进入源码目录
          cd source
          
          # 3. 安装所有 feeds (这会包含 rtl8188eu-firmware 等依赖)
          ./scripts/feeds install -a

      - name: Configure Firmware
        run: |
          cd source
          # 生成 .config 文件
          # TARGET 和 SUBTARGET 处理
          TARGET_BOARD="${{ github.event.inputs.target }}"
          TARGET_SUBTARGET="${{ github.event.inputs.subtarget }}"

          # 写入配置
          cat > .config <<EOF
# 通用设置
CONFIG_TARGET_BOARD="$TARGET_BOARD"
CONFIG_TARGET_SUBTARGET="$TARGET_SUBTARGET"
CONFIG_TARGET_PROFILE="Default"
CONFIG_TARGET_IMAGES_GZIP=y
CONFIG_PACKAGE_rtl8188eu-custom=m
EOF

          # 运行 defconfig
          make defconfig

      - name: Build Package
        run: |
          cd source
          # 开始编译
          # 错误提示：如果提示内存不足，可以去掉 -j$(nproc) 让其单线程编译
          make package/rtl8188eu-custom/compile -j$(nproc) V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtl8188eu-ipk
          path: source/bin/packages/**/*.ipk
