name: Build rtl8188eu for ImmortalWrt 24.10

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Platform (e.g., mediatek/filogic, rockchip/armv8, x86/64)'
        required: true
        default: 'mediatek/filogic'
      subtarget:
        description: 'Subtarget (Optional, leave empty if unsure)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libc6-dev libssl-dev libstdc++-14-dev \
          libxml-parser-perl make unzip wget xsltproc zlib1g-dev

      - name: Download SDK
        run: |
          # 定义变量
          TARGET="${{ github.event.inputs.target }}"
          SUBTARGET="${{ github.event.inputs.subtarget }}"
          BASE_URL="https://downloads.immortalwrt.org/releases/24.10-SNAPSHOT/targets/${TARGET}/${SUBTARGET}"

          # 自动获取 SDK 的真实文件名 (根据你提供的网页内容，后缀是 .tar.zst)
          SDK_FILE=$(curl -s ${BASE_URL}/ | grep -oP 'immortalwrt-sdk-24.10-SNAPSHOT-.*?\.tar\.zst' | head -n 1)

          if [ -z "$SDK_FILE" ]; then
            echo "Error: Could not find SDK file on server. URL: ${BASE_URL}"
            exit 1
          fi

          echo "Downloading SDK: $SDK_FILE"
          wget -q ${BASE_URL}/${SDK_FILE} -O sdk.tar.zst

          # 解压 SDK (zst格式)
          mkdir sdk
          tar -xf sdk.tar.zst -C sdk --strip-components=1
          echo "SDK extracted successfully."

      - name: Apply Patches
        run: |
          # 将仓库中的 patches 文件夹复制到 SDK 的驱动源码目录
          # 假设驱动位于 package/kernel/rtl8188eu
          SDK_DIR=$(pwd)/sdk
          PATCH_DIR=$(pwd)/patches
          DRIVER_DIR="${SDK_DIR}/package/kernel/rtl8188eu"

          # 检查驱动目录是否存在，不存在则创建
          if [ ! -d "$DRIVER_DIR" ]; then
            mkdir -p "$DRIVER_DIR"
          fi

          # 复制补丁文件
          cp -r ${PATCH_DIR}/* ${DRIVER_DIR}/
          echo "Patches copied to ${DRIVER_DIR}"

          # 如果有 Makefile 在根目录，也复制进去（覆盖或补充）
          if [ -f "Makefile" ]; then
             cp Makefile ${DRIVER_DIR}/
             echo "Root Makefile copied to driver directory."
          fi

      - name: Build Package
        run: |
          cd sdk
          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 编译驱动
          # 使用你的 Target 和 Subtarget
          make package/kernel/rtl8188eu/compile V=s \
              TARGET="${{ github.event.inputs.target }}" \
              SUBTARGET="${{ github.event.inputs.subtarget }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtl8188eu-ipks
          path: |
            sdk/bin/packages/**/rtl8188eu*.ipk
            sdk/bin/targets/**/*.ipk
