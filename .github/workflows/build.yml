name: Build rtl8188eu for ImmortalWrt 24.10

于:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Platform (e.g., mediatek/filogic, rockchip/armv8, x86/64)'
        required: true
        默认: 'mediatek/filogic'
      subtarget:
        description: 'Subtarget (Optional, leave empty if unsure)'
        required: false
        默认: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
  sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libc6-dev openssl libssl-dev \
          libstdc++-14-dev libxml-parser-perl make unzip wget xsltproc zlib1g-dev

      - name: Download ImmortalWrt SDK
        run: |
          # 1. 下载 24.10 分支的 SDK (自动获取最新版本)
          wget https://downloads.immortalwrt.org/releases/24.10-SNAPSHOT/targets/${{ github.event.inputs.target }}/immortalwrt-sdk-24.10-SNAPSHOT-${{ github.event.inputs.target }}_gcc-*.tar.xz -O sdk.tar.xz
          
          # 2. 解压
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

      - name: Prepare Feeds
        run: |
          cd sdk
          # 复制你的驱动源码到 package 目录
          mkdir -p package/rtl8188eu
          cp ../Makefile package/rtl8188eu/
          cp -r ../patches package/rtl8188eu/ || true
          
          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build Package
        run: |
          cd sdk
          # 配置编译选项
          make defconfig
          # 编译驱动模块
          make package/rtl8188eu/compile V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmod-rtl8188eu
          path: |
            sdk/bin/packages/*/rtl8188eu/*.ipk
            sdk/bin/targets/*/*/*.ipk
