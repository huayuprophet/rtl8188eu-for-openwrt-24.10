name: Build rtl8188eu for ImmortalWrt 24.10.5

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Platform (e.g., x86/64, arm/virt)'
        required: true
        default: 'x86/64'
      subtarget:
        description: 'Subtarget (Optional, leave empty if unsure)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libc6-dev libssl-dev libstdc++-14-dev \
          libxml-parser-perl make unzip wget xsltproc zlib1g-dev zstd

      - name: Clone ImmortalWrt Source 24.10.5
        run: |
          # 1. 克隆完整源码
          git clone --depth 1 -b v24.10.5 https://github.com/immortalwrt/immortalwrt.git source
          
          cd source
          # 2. 更新 feeds
          ./scripts/feeds update -a

      - name: Prepare Package
        run: |
          # 1. 删除源码中自带的旧版 rtl8188eu 驱动，防止冲突
          rm -rf source/package/kernel/rtl8188eu
          
          # 2. 创建标准目录
          mkdir -p source/package/kernel/rtl8188eu
          
          # 3. 重构复制逻辑：显式复制已知文件，排除 source 目录
          # 这样彻底避免了把 source 目录复制进它自己的死循环
          # 假设你的仓库根目录包含：patches, Makefile, core, hal 等
          
          # 复制 patches 文件夹 (如果存在)
          if [ -d "patches" ]; then
            cp -r patches source/package/kernel/rtl8188eu/
          fi
          
          # 复制 Makefile (如果存在)
          if [ -f "Makefile" ]; then
            cp Makefile source/package/kernel/rtl8188eu/
          fi
          
          # 复制其他驱动源码目录 (根据你的实际目录结构调整，例如 core, hal, os_dep)
          # 这里使用通配符，但排除了 .git 和 source 目录
          for dir in core hal os_dep; do
            if [ -d "$dir" ]; then
              cp -r "$dir" source/package/kernel/rtl8188eu/
            fi
          done
          
          # 复制根目录下的其他必要文件 (如 Kconfig, 如果有的话)
          cp -n ./* source/package/kernel/rtl8188eu/ 2>/dev/null || true

      - name: Configure Build
        run: |
          cd source
          # 使用 echo -e 写入配置，避免 YAML 缩进错误
          echo -e "CONFIG_TARGET_BOARD=\"${{ github.event.inputs.target }}\"\nCONFIG_TARGET_SUBTARGET=\"${{ github.event.inputs.subtarget }}\"\nCONFIG_TARGET_PROFILE=\"Default\"\nCONFIG_PACKAGE_rtl8188eu=m" > .config
          
          make defconfig

      - name: Build Package
        run: |
          cd source
          # 编译驱动
          make package/kernel/rtl8188eu/compile -j$(nproc) V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtl8188eu-ipk
          path: source/bin/packages/**/*.ipk
