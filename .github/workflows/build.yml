name: Build rtl8188eu for ImmortalWrt 24.10.5

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Platform (e.g., x86/64)'
        required: true
        default: 'x86/64'
      subtarget:
        description: 'Subtarget (Optional, leave empty)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libc6-dev libssl-dev libstdc++-14-dev \
          libxml-parser-perl make unzip wget xsltproc zlib1g-dev zstd

      - name: Download and Extract SDK (Fixed Link)
        run: |
          # 1. 定义 SDK 绝对链接
          # 根据网页解析内容，直接使用 x86_64 版本的硬链接
          SDK_URL="https://downloads.immortalwrt.org/releases/2024.10.5/targets/x86/64/immortalwrt-sdk-2024.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          
          # 2. 下载 SDK
          echo "Downloading SDK from: $SDK_URL"
          wget "$SDK_URL" -O sdk.tar.zst
          
          # 3. 检查下载是否成功
          if [ ! -f sdk.tar.zst ]; then
            echo "Error: SDK download failed."
            exit 1
          fi
          
          # 4. 解压 SDK
          mkdir sdk
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1
          echo "SDK extracted successfully."

      - name: Prepare Package
        run: |
          # 1. 在 SDK 的 package 目录下创建我们的驱动目录
          mkdir -p sdk/package/rtl8188eu
          
          # 2. 复制你的驱动源码（Makefile, core, hal, patches 等）到 SDK 中
          # 注意：这里假设你的仓库根目录就是驱动源码目录
          cp -r ./* sdk/package/rtl8188eu/
          
          # 3. 进入 SDK 目录
          cd sdk
          
          # 4. 更新 feeds (SDK 通常不需要，但为了保险)
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure Build
        run: |
          cd sdk
          # 写入配置
          # 注意：SDK 编译通常不需要指定 TARGET_BOARD，因为它已经在 SDK 内部定好了
          # 我们只需要启用我们的包
          echo "CONFIG_PACKAGE_rtl8188eu=m" >> .config
          
          make defconfig

      - name: Build Package
        run: |
          cd sdk
          # 编译驱动
          make package/rtl8188eu/compile -j$(nproc) V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtl8188eu-ipk
          path: sdk/bin/packages/**/*.ipk
