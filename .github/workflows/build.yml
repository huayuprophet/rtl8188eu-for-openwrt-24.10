name: Build rtl8188eu for ImmortalWrt 24.10.5

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Platform (e.g., x86/64)'
        required: true
        default: 'x86/64'
      subtarget:
        description: 'Subtarget (Optional, leave empty)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libc6-dev libssl-dev libstdc++-14-dev \
          libxml-parser-perl make unzip wget xsltproc zlib1g-dev zstd

      - name: Download and Extract SDK
        run: |
          # 1. 定义正确的 SDK 绝对链接
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.5/targets/x86/64/immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          
          # 2. 下载 SDK
          echo "Downloading SDK from: $SDK_URL"
          wget "$SDK_URL" -O sdk.tar.zst
          
          # 3. 检查下载是否成功
          if [ ! -f sdk.tar.zst ]; then
            echo "Error: SDK download failed."
            exit 1
          fi
          
          # 4. 解压 SDK
          mkdir sdk
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1
          echo "SDK extracted successfully."

      - name: Prepare Package
        run: |
          # 1. 在 SDK 的 package 目录下创建我们的驱动目录
          mkdir -p sdk/package/rtl8188eu
          
          # 2. 复制你的驱动源码到 SDK 中
          # 关键点：这里不使用 cd sdk，而是直接指定源和目标路径
          # 源路径：当前仓库根目录 (.)，但排除 sdk 目录本身
          # 目标路径：sdk/package/rtl8188eu
          
          # 方法：显式复制已知文件，避免复制 sdk 目录本身
          # 假设你的仓库根目录包含：patches, Makefile, core, hal 等
          
          # 复制 patches 文件夹 (如果存在)
          if [ -d "patches" ]; then
            cp -r patches sdk/package/rtl8188eu/
          fi
          
          # 复制 Makefile (如果存在)
          if [ -f "Makefile" ]; then
            cp Makefile sdk/package/rtl8188eu/
          fi
          
          # 复制其他驱动源码目录 (根据你的实际目录结构调整，例如 core, hal, os_dep)
          for dir in core hal os_dep; do
            if [ -d "$dir" ]; then
              cp -r "$dir" sdk/package/rtl8188eu/
            fi
          done
          
          # 复制根目录下的其他必要文件 (如 Kconfig, 如果有的话)
          # 使用 -n 参数防止覆盖已复制的文件，并忽略错误
          cp -n ./* sdk/package/rtl8188eu/ 2>/dev/null || true
          
          echo "Package prepared successfully."

      - name: Configure Build
        run: |
          cd sdk
          # 写入配置
          # SDK 已经预设了目标架构，只需启用我们的包
          echo "CONFIG_PACKAGE_rtl8188eu=m" >> .config
          
          make defconfig

      - name: Build Package
        run: |
          cd sdk
          # 编译驱动
          make package/rtl8188eu/compile -j$(nproc) V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtl8188eu-ipk
          path: sdk/bin/packages/**/*.ipk
