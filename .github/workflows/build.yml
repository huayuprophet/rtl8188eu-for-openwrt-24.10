name: Build rtl8188eu for ImmortalWrt 24.10

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Platform (e.g., mediatek/filogic, rockchip/armv8, x86/64)'
        required: true
        default: 'mediatek/filogic'
      subtarget:
        description: 'Subtarget (Optional, leave empty if unsure)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libc6-dev openssl libssl-dev \
          libstdc++-14-dev libxml-parser-perl make unzip wget xsltproc zlib1g-dev curl

      - name: Download ImmortalWrt SDK
        run: |
          TARGET="${{ github.event.inputs.target }}"
          # 定义基础 URL
          BASE_URL="https://downloads.immortalwrt.org/releases/24.10-SNAPSHOT/targets/${TARGET}"
          
          # 自动获取 SDK 的真实文件名 (通过解析 HTML 页面)
          # 这一步是为了防止文件名变动导致下载失败
          SDK_FILE=$(curl -s ${BASE_URL}/ | grep -oP 'immortalwrt-sdk-24.10-SNAPSHOT-.*?\.tar\.xz' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "Error: Could not find SDK file on server. Check target architecture."
            exit 1
          fi
          
          echo "Found SDK: $SDK_FILE"
          wget -q ${BASE_URL}/${SDK_FILE} -O sdk.tar.xz
          
          # 解压 SDK
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1
          echo "SDK extracted successfully."

      - name: Prepare Package
        run: |
          cd sdk
          
          # 创建驱动目录
          mkdir -p package/rtl8188eu
          
          # 复制源码 (Makefile 和 patches)
          cp -r ../Makefile package/rtl8188eu/
          cp -r ../patches package/rtl8188eu/ 2>/dev/null || true
          
          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build Package
        run: |
          cd sdk
          # 编译命令
          make package/rtl8188eu/compile V=s -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmod-rtl8188eu-ipks
          path: |
            sdk/bin/packages/**/*.ipk
